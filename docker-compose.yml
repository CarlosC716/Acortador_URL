services:
  mysql-db:
    image: mysql:8
    container_name: acortador-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=acortador_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - acortador-net

  acortador-app:
    build: . 
    container_name: acortador-backend
    restart: always
    depends_on:
      - mysql-db 
    ports:
      - "8081:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/acortador_db?createDatabaseIfNotExist=true
      - DB_USER=root
      - DB_PASSWORD=root
    networks:
      - acortador-net

volumes:
  mysql_data:

networks:
  acortador-net:
    driver: bridge